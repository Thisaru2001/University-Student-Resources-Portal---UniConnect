<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Upload Resource</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-container">
        
        <aside class="sidebar">
            <div class="logo-section">
		<img src="C:/Users/Hilaly/OneDrive/Desktop/logo.png" height=50px gap =20px />
                <h2>STUDENT DASHBOARD</h2>
            </div>
            <nav class="nav-links">
                <a href="#" class="nav-item">🏠 HOME</a>
                <a href="#" class="nav-item active">➕ UPLOAD RESOURCE</a>
                <a href="#" class="nav-item logout">🚪 Log out</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <div class="user-info">
                    <span class="user-name">Sarah J.</span>
                    <span class="user-dept">CSE-401</span>
                </div>
            </header>

            <section class="form-container">
                <h1 class="form-title">Upload Resource</h1>
                <p class="form-subtitle">Submit a New Learning Resource</p>

                <form id="resource-form">
                    <div class="form-group">
                        <label for="file-name">File Name</label>
                        <input type="text" id="file-name" placeholder="Advanced Algorithms Lecture Notes">
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea id="description" placeholder="Description"></textarea>
                    </div>

                    <div class="meta-grid">
                        <div class="form-group">
                            <label for="department">Department</label>
                            <select id="department">
                                <option>CSE</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="academic-year">Academic Year</label>
                            <select id="academic-year">
                                <option>3rd Year</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="semester">Semester</label>
                            <select id="semester">
                                <option>Sem 6</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="course-field">Course Field</label>
                            <select id="course-field">
                                <option>PHNS 32562-Elective</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="resource-type">Resource Type</label>
                            <select id="resource-type">
                                <option>Lecture Notes</option>
                                <option>Exam paper</option>
                                <option>Assignment</option>
                                <option>Tutorial</option>
                                <option>Spot test</option>
                                <option>Answer sheet</option>
                            </select>
                        </div>
                    </div>

                    <div class="dropzone" id="dropzone">
                        <div class="upload-icon">☁️</div>
                        <p class="dropzone-text">DRAG & DROP FILES OR CLICK TO UPLOAD.</p>
                        <p class="dropzone-subtext">Supported: PDF, DOCX, PPTX, JPG, PNG. Max size 20MB.</p>
                        
                        <input type="file" id="file-input" style="display: none;" accept=".pdf,.docx,.pptx,.jpg,.png">
                        
                        <div class="file-status" id="file-status">No file selected</div>
                    </div>

                    <div class="form-footer">
                        <label class="checkbox-container">
                            <input type="checkbox" id="anonymous-upload"> Anonymous upload
                        </label>
                        <button type="button" class="upload-btn" id="upload-btn">UPLOAD</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
